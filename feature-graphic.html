<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Net Connect Feature Graphic</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #333; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  .banner {
    width: 1024px;
    height: 500px;
    background: linear-gradient(135deg, #0a1628 0%, #0d2137 30%, #0a1628 60%, #111d33 100%);
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', Arial, sans-serif;
  }
  /* Grid lines background */
  .grid {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image:
      linear-gradient(rgba(0, 229, 255, 0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0, 229, 255, 0.05) 1px, transparent 1px);
    background-size: 40px 40px;
  }
  /* Glowing nodes */
  .node {
    position: absolute;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: #00e5ff;
    box-shadow: 0 0 15px #00e5ff, 0 0 30px rgba(0, 229, 255, 0.4);
  }
  .node.green { background: #00ff88; box-shadow: 0 0 15px #00ff88, 0 0 30px rgba(0, 255, 136, 0.4); }
  .node.orange { background: #ff9800; box-shadow: 0 0 15px #ff9800, 0 0 30px rgba(255, 152, 0, 0.4); }
  /* Connection lines */
  .line {
    position: absolute;
    height: 2px;
    background: linear-gradient(90deg, rgba(0, 229, 255, 0.6), rgba(0, 229, 255, 0.1));
    box-shadow: 0 0 8px rgba(0, 229, 255, 0.3);
  }
  .line.v {
    width: 2px;
    height: auto;
    background: linear-gradient(180deg, rgba(0, 229, 255, 0.6), rgba(0, 229, 255, 0.1));
  }
  /* Content */
  .content {
    position: relative;
    z-index: 2;
    display: flex;
    align-items: center;
    gap: 40px;
  }
  .icon-area {
    width: 200px;
    height: 200px;
    border-radius: 40px;
    overflow: hidden;
    box-shadow: 0 0 40px rgba(0, 229, 255, 0.3), 0 10px 40px rgba(0, 0, 0, 0.5);
    flex-shrink: 0;
  }
  .icon-area img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  /* Placeholder if no icon image */
  .icon-placeholder {
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, #0a2a4a, #1a4a7a);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 80px;
  }
  .text-area {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .title {
    font-size: 72px;
    font-weight: 700;
    color: #ffffff;
    text-shadow: 0 0 30px rgba(0, 229, 255, 0.5), 0 2px 10px rgba(0, 0, 0, 0.5);
    letter-spacing: 2px;
  }
  .title span {
    color: #00e5ff;
  }
  .tagline {
    font-size: 24px;
    color: rgba(255, 255, 255, 0.7);
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  .stars {
    display: flex;
    gap: 8px;
    margin-top: 4px;
  }
  .star {
    font-size: 28px;
    color: #ffd700;
    text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
  }
  /* Decorative circles */
  .circle {
    position: absolute;
    border-radius: 50%;
    border: 1px solid rgba(0, 229, 255, 0.15);
  }
  .c1 { width: 300px; height: 300px; top: -80px; right: -60px; }
  .c2 { width: 200px; height: 200px; bottom: -40px; left: -30px; }
  .c3 { width: 150px; height: 150px; top: 50px; left: 60px; border-color: rgba(0, 229, 255, 0.08); }
  /* Glow accent */
  .glow {
    position: absolute;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0, 229, 255, 0.08) 0%, transparent 70%);
    top: 50%;
    left: 30%;
    transform: translate(-50%, -50%);
  }
</style>
</head>
<body>
  <div class="banner">
    <div class="grid"></div>
    <div class="glow"></div>
    <div class="circle c1"></div>
    <div class="circle c2"></div>
    <div class="circle c3"></div>

    <!-- Decorative nodes -->
    <div class="node" style="top: 60px; left: 80px;"></div>
    <div class="node green" style="top: 120px; left: 200px;"></div>
    <div class="node" style="top: 400px; left: 150px;"></div>
    <div class="node orange" style="top: 80px; right: 120px;"></div>
    <div class="node" style="bottom: 80px; right: 200px;"></div>
    <div class="node green" style="top: 250px; left: 50px;"></div>
    <div class="node" style="bottom: 60px; left: 350px;"></div>
    <div class="node orange" style="top: 350px; right: 80px;"></div>

    <!-- Connection lines -->
    <div class="line" style="top: 66px; left: 92px; width: 108px;"></div>
    <div class="line" style="top: 406px; left: 162px; width: 188px;"></div>
    <div class="line" style="top: 86px; right: 132px; width: 80px; transform: rotate(70deg); transform-origin: left;"></div>

    <div class="content">
      <div class="icon-area">
        <!-- Replace src with your actual app icon path -->
        <img src="app-icon.png" onerror="this.parentElement.innerHTML='<div class=icon-placeholder>🌐</div>'" />
      </div>
      <div class="text-area">
        <div class="title"><span>Net</span> Connect</div>
        <div class="tagline">Network Puzzle Game</div>
        <div class="stars">
          <span class="star">★</span>
          <span class="star">★</span>
          <span class="star">★</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
